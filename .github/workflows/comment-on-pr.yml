name: Comment on PR

on:
  workflow_run:
    workflows: ["Build Chess Engine"]
    types:
      - completed

jobs:
  comment:
    runs-on: ubuntu-latest
    if: >
      github.event.workflow_run.event == 'pull_request' &&
      github.event.workflow_run.conclusion == 'success'

    permissions:
      pull-requests: write
      issues: write
      actions: read

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          run-id: ${{ github.event.workflow_run.id }}
          path: artifacts/

      - name: Display structure of downloaded files
        run: ls -R artifacts/

      - name: Extract metadata
        run: |
          echo "PR_NUMBER=$(cat artifacts/pr-metadata/pr-number.txt)" >> $GITHUB_ENV
          echo "PR_SHA=$(cat artifacts/pr-metadata/pr-sha.txt)" >> $GITHUB_ENV
          echo "ARTIFACT_NAME=$(cat artifacts/pr-metadata/artifact-name.txt)" >> $GITHUB_ENV
          echo "PR_TITLE=$(cat artifacts/pr-metadata/pr-title.txt)" >> $GITHUB_ENV

      - name: Find JAR artifact and comment on PR
        uses: actions/github-script@v7
        with:
          script: |
            const prNumber = parseInt(process.env.PR_NUMBER);
            const runId = context.payload.workflow_run.id;
            const sha = process.env.PR_SHA;
            const artifactName = process.env.ARTIFACT_NAME;
            
            // Get the artifact ID for the download link
            const artifacts = await github.rest.actions.listWorkflowRunArtifacts({
              owner: context.repo.owner,
              repo: context.repo.repo,
              run_id: runId,
            });
            
            const jarArtifact = artifacts.data.artifacts.find(
              artifact => artifact.name === `hackathon-engine_${artifactName}`
            );
            
            if (!jarArtifact) {
              core.setFailed('JAR artifact not found');
              return;
            }
            
            const artifactUrl = `https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${runId}/artifacts/${jarArtifact.id}`;
            
            const comment = `## Chess Engine Built Successfully!
            
            Your engine has been compiled and is ready for testing.
            
            ### Download your JAR:
            **[Click here to download: \`hackathon-engine_${artifactName}\`](${artifactUrl})**
            
            ---
            <sub>Build: [#${runId}](https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${runId}) | Commit: ${sha.substring(0, 7)}</sub>`;
            
            // Check if we already commented
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
            });
            
            const botComment = comments.find(comment => 
              comment.user.type === 'Bot' && 
              comment.body.includes('Chess Engine Built Successfully')
            );
            
            if (botComment) {
              // Update existing comment
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body: comment
              });
              console.log('Updated existing comment');
            } else {
              // Create new comment
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                body: comment
              });
              console.log('Created new comment');
            }
