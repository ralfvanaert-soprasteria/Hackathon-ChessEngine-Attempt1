name: Comment on PR

on:
  workflow_run:
    workflows: ["Build Chess Engine"]
    types:
      - completed

jobs:
  comment:
    runs-on: ubuntu-latest
    if: >
      github.event.workflow_run.event == 'pull_request' &&
      github.event.workflow_run.conclusion == 'success'

    permissions:
      pull-requests: write
      issues: write
      actions: read

    steps:
      - name: Download artifacts
        uses: actions/github-script@v7
        with:
          script: |
            const artifacts = await github.rest.actions.listWorkflowRunArtifacts({
              owner: context.repo.owner,
              repo: context.repo.repo,
              run_id: context.payload.workflow_run.id,
            });
            
            const metadataArtifact = artifacts.data.artifacts.find(
              artifact => artifact.name === 'pr-metadata'
            );
            
            if (!metadataArtifact) {
              core.setFailed('No metadata artifact found');
              return;
            }
            
            const download = await github.rest.actions.downloadArtifact({
              owner: context.repo.owner,
              repo: context.repo.repo,
              artifact_id: metadataArtifact.id,
              archive_format: 'zip',
            });
            
            const fs = require('fs');
            fs.writeFileSync('pr-metadata.zip', Buffer.from(download.data));

      - name: Extract metadata
        run: |
          unzip pr-metadata.zip
          echo "PR_NUMBER=$(cat pr-number.txt)" >> $GITHUB_ENV
          echo "PR_SHA=$(cat pr-sha.txt)" >> $GITHUB_ENV
          echo "ARTIFACT_NAME=$(cat artifact-name.txt)" >> $GITHUB_ENV
          echo "PR_TITLE=$(cat pr-title.txt)" >> $GITHUB_ENV

      - name: Find JAR artifact
        id: find-jar
        uses: actions/github-script@v7
        with:
          script: |
            const artifacts = await github.rest.actions.listWorkflowRunArtifacts({
              owner: context.repo.owner,
              repo: context.repo.repo,
              run_id: context.payload.workflow_run.id,
            });
            
            const artifactName = process.env.ARTIFACT_NAME;
            const jarArtifact = artifacts.data.artifacts.find(
              artifact => artifact.name === `hackathon-engine_${artifactName}`
            );
            
            if (!jarArtifact) {
              core.setFailed('JAR artifact not found');
              return;
            }
            
            const artifactUrl = `https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.payload.workflow_run.id}/artifacts/${jarArtifact.id}`;
            
            core.setOutput('url', artifactUrl);
            core.setOutput('id', jarArtifact.id);
            core.setOutput('name', jarArtifact.name);

      - name: Comment on PR
        uses: actions/github-script@v7
        with:
          script: |
            const prNumber = parseInt(process.env.PR_NUMBER);
            const runId = context.payload.workflow_run.id;
            const artifactUrl = '${{ steps.find-jar.outputs.url }}';
            const artifactName = '${{ steps.find-jar.outputs.name }}';
            const sha = process.env.PR_SHA;
            
            const comment = `## ✅ Chess Engine Built Successfully!
            
            Your engine has been compiled and is ready for testing.
            
            ### Download your JAR:
            **[📦 Click here to download: \`${artifactName}.jar\`](${artifactUrl})**
            
            ---
            <sub>Build: [#${runId}](https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${runId}) | Commit: ${sha.substring(0, 7)}</sub>`;
            
            // Check if we already commented
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
            });
            
            const botComment = comments.find(comment => 
              comment.user.type === 'Bot' && 
              comment.body.includes('Chess Engine Built Successfully')
            );
            
            if (botComment) {
              // Update existing comment
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body: comment
              });
            } else {
              // Create new comment
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                body: comment
              });
            }
