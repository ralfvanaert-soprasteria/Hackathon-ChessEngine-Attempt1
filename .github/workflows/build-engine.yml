name: Build Chess Engine

on:
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout PR code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Checkout and build KnightClubbingLogic dependency
        run: |
          cd ..
          git clone https://github.com/rpjvanaert/KnightClubbingLogic.git
          cd KnightClubbingLogic
          mvn clean install -DskipTests

      - name: Build Chess Engine
        run: mvn clean package

      - name: Sanitize PR title for artifact name
        id: sanitize
        run: |
          # Get PR title and sanitize it (remove special chars, replace spaces with hyphens)
          PR_TITLE="${{ github.event.pull_request.title }}"
          SANITIZED=$(echo "$PR_TITLE" | tr '[:upper:]' '[:lower:]' | sed 's/[^a-z0-9-]/-/g' | sed 's/--*/-/g' | sed 's/^-//' | sed 's/-$//')
          # Limit length to 50 chars
          SANITIZED=${SANITIZED:0:50}
          echo "name=$SANITIZED" >> $GITHUB_OUTPUT
          echo "Sanitized name: $SANITIZED"

      - name: Save PR metadata for commenting workflow
        run: |
          mkdir -p pr-metadata
          echo "${{ github.event.number }}" > pr-metadata/pr-number.txt
          echo "${{ github.event.pull_request.head.sha }}" > pr-metadata/pr-sha.txt
          echo "${{ steps.sanitize.outputs.name }}" > pr-metadata/artifact-name.txt
          echo "${{ github.event.pull_request.title }}" > pr-metadata/pr-title.txt

      - name: Upload JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: hackathon-engine_${{ steps.sanitize.outputs.name }}
          path: target/Hackathon-ChessEngine-*.jar
          retention-days: 30

      - name: Upload PR metadata
        uses: actions/upload-artifact@v4
        with:
          name: pr-metadata
          path: pr-metadata/
          retention-days: 1

      - name: Verify JAR was created
        run: |
          ls -lh target/*.jar
          echo "Engine built successfully!"
