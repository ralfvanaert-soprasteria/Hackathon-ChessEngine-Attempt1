name: Build Chess Engine

on:
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest

    # Add these permissions to allow commenting on PRs
    permissions:
      contents: read
      pull-requests: write
      issues: write

    steps:
      - name: Checkout PR code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Checkout and build KnightClubbingLogic dependency
        run: |
          cd ..
          git clone https://github.com/rpjvanaert/KnightClubbingLogic.git
          cd KnightClubbingLogic
          mvn clean install -DskipTests

      - name: Build Chess Engine
        run: mvn clean package

      - name: Sanitize PR title for artifact name
        id: sanitize
        run: |
          # Get PR title and sanitize it (remove special chars, replace spaces with hyphens)
          PR_TITLE="${{ github.event.pull_request.title }}"
          SANITIZED=$(echo "$PR_TITLE" | tr '[:upper:]' '[:lower:]' | sed 's/[^a-z0-9-]/-/g' | sed 's/--*/-/g' | sed 's/^-//' | sed 's/-$//')
          # Limit length to 50 chars
          SANITIZED=${SANITIZED:0:50}
          echo "name=$SANITIZED" >> $GITHUB_OUTPUT
          echo "Sanitized name: $SANITIZED"

      - name: Upload to transfer.sh for direct download
        id: transfer
        run: |
          JAR_FILE=$(ls target/Hackathon-ChessEngine-*.jar | head -n 1)
          CLEAN_NAME="engine-${{ steps.sanitize.outputs.name }}.jar"
          
          # Upload to transfer.sh and capture the URL
          DOWNLOAD_URL=$(curl --upload-file "$JAR_FILE" "https://transfer.sh/$CLEAN_NAME")
          
          echo "url=$DOWNLOAD_URL" >> $GITHUB_OUTPUT
          echo "filename=$CLEAN_NAME" >> $GITHUB_OUTPUT
          echo "Direct download URL: $DOWNLOAD_URL"

      - name: Upload JAR artifact (backup)
        uses: actions/upload-artifact@v4
        id: artifact-upload
        with:
          name: hackathon-engine_${{ steps.sanitize.outputs.name }}
          path: target/Hackathon-ChessEngine-*.jar
          retention-days: 30

      - name: Verify JAR was created
        run: |
          ls -lh target/*.jar
          echo "Engine built successfully!"

      - name: Comment on PR with download links
        uses: actions/github-script@v7
        with:
          script: |
            const prNumber = context.issue.number;
            const runId = context.runId;
            const repo = context.repo;
            const artifactName = 'engine-${{ steps.sanitize.outputs.name }}';
            const downloadUrl = '${{ steps.transfer.outputs.url }}';
            const filename = '${{ steps.transfer.outputs.filename }}';
            
            const comment = `##Chess Engine Built Successfully!
            
            Your engine has been compiled and is ready for testing.
            
            ### Download:
            **[Click here to download ${filename}](${downloadUrl})**
            
            _Link expires in 14 days. File hosted on transfer.sh_
            
            ### Alternative Download (GitHub Artifacts):
            If the direct link doesn't work, you can download from [GitHub Actions artifacts](https://github.com/${repo.owner}/${repo.repo}/actions/runs/${runId})
            
            Look for the artifact named: \`${artifactName}\`
            
            ---
            <sub>Build: ${runId} | Commit: ${context.sha.substring(0, 7)}</sub>`;
            
            github.rest.issues.createComment({
              owner: repo.owner,
              repo: repo.repo,
              issue_number: prNumber,
              body: comment
            });
